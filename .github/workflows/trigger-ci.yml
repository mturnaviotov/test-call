name: Trigger CI

on:
  push:
    tags:
      - '*'
jobs:  
  trigger_ci:  
    runs-on: ubuntu-latest
    steps:  
      - name: Trigger CI Workflow
        uses: actions/github-script@v7
        with:  
          github-token: ${{ secrets.TRIGGER_TOKEN }}
          script: |
            const tagRef = '${{ github.ref }}'.replace('refs/tags/', '');
            await github.actions.createWorkflowDispatch({
              owner: 'mturnaviotov',
              repo: 'test-run',
              workflow_id: 'blank.yml',
              ref: 'main',
              inputs: {
                username: tagRef
              }
            });
